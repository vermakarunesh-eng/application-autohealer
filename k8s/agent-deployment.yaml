apiVersion: v1
kind: Namespace
metadata:
  name: autohealer
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: autopilot-agent
  namespace: autohealer
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: autopilot-agent
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log", "events"]
    verbs: ["get", "list", "delete"]
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets"]
    verbs: ["get", "list", "patch", "update"]
  - apiGroups: ["apps"]
    resources: ["deployments/rollback"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: autopilot-agent
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: autopilot-agent
subjects:
  - kind: ServiceAccount
    name: autopilot-agent
    namespace: autohealer
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: autopilot-isolator
  namespace: autohealer
  labels:
    app: autopilot-isolator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: autopilot-isolator
  template:
    metadata:
      labels:
        app: autopilot-isolator
    spec:
      serviceAccountName: autopilot-agent
      containers:
        - name: agent-isolator
          image: gcr.io/auto-app-healer/autopilot-agent:latest
          command: ["python", "agent_isolator.py"]
          env:
            - name: NAMESPACE
              value: "autohealer"
            - name: POLL_INTERVAL
              value: "30"
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: anthropic-secret
                  key: api_key
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: autopilot-repairer
  namespace: autohealer
  labels:
    app: autopilot-repairer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: autopilot-repairer
  template:
    metadata:
      labels:
        app: autopilot-repairer
    spec:
      serviceAccountName: autopilot-agent
      containers:
        - name: agent-repairer
          image: gcr.io/auto-app-healer/autopilot-agent:latest
          command: ["python", "agent_repairer.py"]
          env:
            - name: NAMESPACE
              value: "autohealer"
            - name: POLL_INTERVAL
              value: "30"
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: anthropic-secret
                  key: api_key
